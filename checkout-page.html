<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout — MBA Partner</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400..900;1,9..144,400..900&family=Inter:wght@400;500;600;700;800&family=IBM+Plex+Mono:wght@500;600&display=swap"
        rel="stylesheet">
    <!-- Razorpay Checkout.js -->
    <script src="https://checkout.razorpay.com/v1/checkout.js"></script>
    <style>
        :root {
            --ink: #0F1419;
            --ink-soft: #1a202c;
            --paper: #F8F6F3;
            --paper-card: #FFFFFF;
            --primary: #6366F1;
            --primary-dark: #4F46E5;
            --primary-light: #818CF8;
            --accent: #EC4899;
            --success: #10B981;
            --danger: #EF4444;
            --surface: #F3F4F6;
            --rule: #E5E7EB;
            --ink-faint: #6B7280;
            --radius: 12px;
        }

        * {
            box-sizing: border-box
        }

        html {
            scroll-behavior: smooth
        }

        body {
            margin: 0;
            background: var(--paper);
            color: var(--ink);
            font-family: 'Inter', system-ui, sans-serif;
            -webkit-font-smoothing: antialiased
        }

        h1,
        h2,
        h3 {
            font-family: 'Fraunces', serif;
            margin: 0;
            letter-spacing: -0.01em
        }

        .mono {
            font-family: 'IBM Plex Mono', monospace
        }

        a {
            color: inherit;
            text-decoration: none
        }

        .wrap {
            max-width: 1120px;
            margin: 0 auto;
            padding: 0 24px
        }

        :focus-visible {
            outline: 2px solid var(--primary);
            outline-offset: 3px
        }

        /* ---------- NAV ---------- */
        .nav {
            position: sticky;
            top: 0;
            z-index: 50;
            background: var(--ink);
            color: #FFF;
            border-bottom: 1px solid rgba(255, 255, 255, .1);
            box-shadow: 0 2px 8px rgba(0, 0, 0, .08)
        }

        .nav-inner {
            max-width: 1120px;
            margin: 0 auto;
            padding: 14px 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 16px
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 10px
        }

        .brand-mark {
            width: 36px;
            height: 36px;
            border-radius: 9px;
            background: linear-gradient(135deg, var(--primary) 0%, var(--accent) 100%);
            color: #fff;
            font-family: 'Fraunces', serif;
            font-weight: 800;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 15px
        }

        .brand-text {
            display: flex;
            flex-direction: column;
            line-height: 1.15
        }

        .brand-text span {
            font-weight: 700;
            font-size: 15px
        }

        .brand-text small {
            font-size: 10.5px;
            letter-spacing: .06em;
            text-transform: uppercase;
            color: #A0AEC0
        }

        /* ---------- BREADCRUMB ---------- */
        .breadcrumb {
            padding: 16px 0;
            font-size: 13.5px;
            color: var(--ink-faint)
        }

        .breadcrumb a {
            transition: color .2s
        }

        .breadcrumb a:hover {
            color: var(--primary)
        }

        .breadcrumb span.sep {
            margin: 0 8px;
            color: #C7CCD4
        }

        .breadcrumb span.current {
            color: var(--ink);
            font-weight: 600
        }

        /* ---------- PAGE HEAD ---------- */
        .checkout-head {
            padding: 8px 0 24px
        }

        .checkout-head h1 {
            font-size: clamp(24px, 2.8vw, 32px);
            font-weight: 700
        }

        .checkout-head p {
            margin-top: 6px;
            color: var(--ink-faint);
            font-size: 14px
        }

        /* ---------- LAYOUT ---------- */
        .checkout-layout {
            display: grid;
            grid-template-columns: 1.5fr 1fr;
            gap: 28px;
            align-items: start;
            padding-bottom: 60px
        }

        @media (max-width:860px) {
            .checkout-layout {
                grid-template-columns: 1fr
            }
        }

        /* ---------- PAYMENT CARD ---------- */
        .pay-card {
            background: var(--paper-card);
            border: 1px solid var(--rule);
            border-radius: 16px;
            padding: 28px
        }

        .pay-tabs {
            display: flex;
            gap: 4px;
            border-bottom: 1px solid var(--rule);
            margin-bottom: 24px
        }

        .pay-tab {
            flex: 1;
            text-align: center;
            padding: 12px 8px;
            font-size: 14px;
            font-weight: 700;
            color: var(--ink-faint);
            cursor: pointer;
            border-bottom: 2px solid transparent;
            transition: all .2s;
            background: none;
            border-left: none;
            border-right: none;
            border-top: none;
            font-family: 'Inter', system-ui, sans-serif;
        }

        .pay-tab.active {
            color: var(--primary-dark);
            border-bottom-color: var(--primary)
        }

        .pay-tab:hover:not(.active) {
            color: var(--ink)
        }

        .field-group {
            margin-bottom: 18px
        }

        .field-group label {
            display: block;
            font-size: 13.5px;
            font-weight: 700;
            color: var(--ink-soft);
            margin-bottom: 7px
        }

        .field-group input {
            width: 100%;
            border: 1.5px solid var(--rule);
            border-radius: 10px;
            padding: 12px 14px;
            font-size: 14px;
            font-family: 'Inter', system-ui, sans-serif;
            background: var(--surface);
            color: var(--ink);
            transition: border-color .2s
        }

        .field-group input:focus-visible {
            outline: none;
            border-color: var(--primary)
        }

        .field-group .err {
            color: var(--danger);
            font-size: 12px;
            margin-top: 5px;
            min-height: 14px
        }

        .field-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 14px
        }

        .pay-note {
            display: flex;
            gap: 10px;
            align-items: flex-start;
            background: var(--surface);
            border: 1px solid var(--rule);
            border-radius: 10px;
            padding: 14px 16px;
            font-size: 13px;
            color: var(--ink-faint);
            margin-bottom: 20px;
            line-height: 1.5
        }

        .pay-method-panel {
            display: none
        }

        .pay-method-panel.active {
            display: block
        }

        .upi-box,
        .netbanking-box {
            text-align: center;
            padding: 30px 10px;
            color: var(--ink-faint);
            font-size: 14px
        }

        .upi-box svg,
        .netbanking-box svg {
            margin-bottom: 12px
        }

        .btn {
            padding: 15px 24px;
            border-radius: 10px;
            font-weight: 700;
            font-size: 15px;
            transition: all .3s;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            cursor: pointer;
            border: none;
            width: 100%;
            font-family: 'Inter', system-ui, sans-serif;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--primary) 0%, var(--accent) 100%);
            color: #fff;
            box-shadow: 0 4px 12px rgba(99, 102, 241, .3)
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 16px rgba(99, 102, 241, .4)
        }

        .btn-primary:disabled {
            opacity: .55;
            cursor: not-allowed;
            transform: none;
            box-shadow: none
        }

        .trust-row {
            display: flex;
            justify-content: center;
            gap: 22px;
            margin-top: 20px;
            font-size: 12px;
            color: var(--ink-faint);
            flex-wrap: wrap
        }

        .trust-row .item {
            display: flex;
            align-items: center;
            gap: 6px
        }

        /* ---------- SUMMARY ---------- */
        .summary-card {
            background: var(--paper-card);
            border: 1px solid var(--rule);
            border-radius: 16px;
            padding: 24px;
            position: sticky;
            top: 90px
        }

        .summary-card h2 {
            font-size: 17px;
            font-weight: 700;
            margin-bottom: 16px
        }

        .summary-items {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-bottom: 14px;
            max-height: 220px;
            overflow-y: auto
        }

        .summary-item {
            display: flex;
            justify-content: space-between;
            gap: 10px;
            font-size: 13px;
            color: var(--ink-soft)
        }

        .summary-item .qty {
            color: var(--ink-faint);
            font-weight: 600
        }

        .summary-item .price {
            font-family: 'IBM Plex Mono', monospace;
            font-weight: 600;
            flex-shrink: 0
        }

        .summary-divider {
            border-top: 1px dashed var(--rule);
            margin: 12px 0
        }

        .summary-row {
            display: flex;
            justify-content: space-between;
            font-size: 14px;
            color: var(--ink-soft);
            padding: 6px 0
        }

        .summary-row .val {
            font-family: 'IBM Plex Mono', monospace;
            font-weight: 600
        }

        .summary-row.savings .val {
            color: var(--success)
        }

        .summary-total {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            padding: 10px 0 0
        }

        .summary-total .label {
            font-size: 15.5px;
            font-weight: 700
        }

        .summary-total .val {
            font-family: 'IBM Plex Mono', monospace;
            font-weight: 700;
            font-size: 24px;
            color: var(--ink)
        }

        .empty-note {
            text-align: center;
            padding: 40px 16px;
            color: var(--ink-faint);
            font-size: 14px
        }
    </style>
</head>

<body>

    <nav class="nav">
        <div class="nav-inner">
            <a class="brand" href="index.html">
                <span class="brand-mark">MP</span>
                <span class="brand-text"><span>MBA Partner</span><small>Initiative by Alumni of Old IIM</small></span>
            </a>
        </div>
    </nav>

    <div class="wrap">
        <div class="breadcrumb">
            <a href="cart-page.html">Cart</a><span class="sep">/</span><span class="current">Checkout</span>
        </div>
    </div>

    <section class="checkout-head">
        <div class="wrap">
            <h1>Checkout</h1>
            <p>Enter your details and complete payment securely.</p>
        </div>
    </section>

    <section>
        <div class="wrap">
            <div class="checkout-layout" id="checkoutLayout">
                <!-- Filled by JS -->
            </div>
        </div>
    </section>

    <script src="cart.js"></script>
    <script>
        /* =====================================================================
           RAZORPAY INTEGRATION — read this before going live
           =====================================================================
           This page is wired for Razorpay Checkout.js, but two things MUST be
           done on a server you control before it can take a real payment:
    
           1) CREATE ORDER (server-side):
              When the person clicks "Pay", this page calls your backend at
              CREATE_ORDER_ENDPOINT below, sending the amount (in paise) and the
              cart. Your backend must call Razorpay's Orders API with your
              Key Secret (NEVER put the Key Secret in this file or any
              client-side JS) and return the order_id to this page.
    
              Example backend call (Node.js):
                const order = await razorpay.orders.create({
                  amount: amountInPaise,
                  currency: "INR",
                  receipt: "order_rcptid_11"
                });
    
           2) VERIFY PAYMENT (server-side):
              After payment, Razorpay calls the `handler` function below with a
              payment_id, order_id, and signature. Send these to your backend's
              VERIFY_PAYMENT_ENDPOINT, which must verify the signature using
              your Key Secret (HMAC SHA256) before marking the order as paid.
              Never trust a "payment success" on the frontend alone.
    
           Until your backend exists, this page will run in DEMO MODE: it shows
           the real Razorpay popup (using a placeholder test key) so you can see
           and test the full UI/flow, but it can't take a real charge without
           your own order_id from step 1.
           ===================================================================== */

        // ---- CONFIG: replace these once your backend is ready ----
        const RAZORPAY_KEY_ID = 'rzp_test_XXXXXXXXXXXX'; // <-- your Razorpay Key ID (public, safe for frontend)
        const CREATE_ORDER_ENDPOINT = '/api/create-order';   // <-- your backend endpoint (TODO: implement)
        const VERIFY_PAYMENT_ENDPOINT = '/api/verify-payment'; // <-- your backend endpoint (TODO: implement)
        const COMPANY_NAME = 'MBA Partner';
        const COMPANY_THEME_COLOR = '#6366F1';

        const { getCart, cartTotals, fmtINR, genOrderId, saveOrder, clearCart } = window.MBACart;

        let activeMethod = 'card';

        function selectTab(method) {
            activeMethod = method;
            document.querySelectorAll('.pay-tab').forEach(t => t.classList.toggle('active', t.dataset.method === method));
            document.querySelectorAll('.pay-method-panel').forEach(p => p.classList.toggle('active', p.dataset.method === method));
        }

        function validateForm() {
            let valid = true;
            const name = document.getElementById('fullName');
            const email = document.getElementById('email');
            const phone = document.getElementById('phone');

            const nameErr = document.getElementById('nameErr');
            const emailErr = document.getElementById('emailErr');
            const phoneErr = document.getElementById('phoneErr');

            nameErr.textContent = '';
            emailErr.textContent = '';
            phoneErr.textContent = '';

            if (!name.value.trim()) { nameErr.textContent = 'Enter your full name.'; valid = false; }
            if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email.value.trim())) { emailErr.textContent = 'Enter a valid email.'; valid = false; }
            if (!/^[6-9]\d{9}$/.test(phone.value.trim().replace(/\D/g, '').slice(-10))) { phoneErr.textContent = 'Enter a valid 10-digit mobile number.'; valid = false; }

            return valid;
        }

        async function startPayment() {
            if (!validateForm()) return;

            const cart = getCart();
            if (!cart.length) return;

            const totals = cartTotals(cart);
            const amountInPaise = Math.round(totals.subtotal * 100);

            const payBtn = document.getElementById('payBtn');
            payBtn.disabled = true;
            payBtn.textContent = 'Preparing payment…';

            const name = document.getElementById('fullName').value.trim();
            const email = document.getElementById('email').value.trim();
            const phone = document.getElementById('phone').value.trim();

            let orderId = null;

            // ---- Step 1: ask YOUR backend to create a Razorpay order ----
            try {
                const res = await fetch(CREATE_ORDER_ENDPOINT, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ amount: amountInPaise, currency: 'INR', cart, name, email, phone })
                });
                if (!res.ok) throw new Error('backend not ready');
                const data = await res.json();
                orderId = data.orderId || data.id;
            } catch (err) {
                // Backend not implemented yet — fall back to DEMO MODE so you can
                // still see the Razorpay popup and test the UI end-to-end.
                console.warn('[Checkout] CREATE_ORDER_ENDPOINT not available yet — running in demo mode.', err);
            }

            payBtn.disabled = false;
            payBtn.textContent = '💳 Complete Payment';

            const options = {
                key: RAZORPAY_KEY_ID,
                amount: amountInPaise,
                currency: 'INR',
                name: COMPANY_NAME,
                description: `Order for ${cart.length} program${cart.length > 1 ? 's' : ''}`,
                image: '', // optional: URL to your logo
                order_id: orderId || undefined, // if null, Razorpay test mode still opens (no real charge capture without a real order_id)
                prefill: { name, email, contact: phone },
                theme: { color: COMPANY_THEME_COLOR },
                method: {
                    card: activeMethod === 'card',
                    upi: activeMethod === 'upi',
                    netbanking: activeMethod === 'netbanking',
                    wallet: false,
                    emi: false
                },
                handler: async function (response) {
                    // ---- Step 2: send payment details to YOUR backend for verification ----
                    try {
                        const verifyRes = await fetch(VERIFY_PAYMENT_ENDPOINT, {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify(response)
                        });
                        if (!verifyRes.ok) throw new Error('verify endpoint not ready');
                    } catch (err) {
                        console.warn('[Checkout] VERIFY_PAYMENT_ENDPOINT not available yet.', err);
                    }

                    const order = {
                        id: response.razorpay_order_id || genOrderId(),
                        paymentId: response.razorpay_payment_id,
                        items: cart,
                        totals: totals,
                        customer: { name, email, phone },
                        createdAt: new Date().toISOString()
                    };
                    saveOrder(order);
                    clearCart();
                    window.location.href = 'order-success.html';
                },
                modal: {
                    ondismiss: function () {
                        payBtn.disabled = false;
                        payBtn.textContent = '💳 Complete Payment';
                    }
                }
            };

            if (typeof Razorpay === 'undefined') {
                alert('Razorpay script failed to load. Check your internet connection and that checkout.razorpay.com is reachable.');
                return;
            }

            const rzp = new Razorpay(options);
            rzp.on('payment.failed', function (response) {
                alert('Payment failed: ' + (response.error && response.error.description ? response.error.description : 'Please try again.'));
            });
            rzp.open();
        }

        function renderEmpty() {
            document.getElementById('checkoutLayout').innerHTML = `
        <div class="empty-note" style="grid-column:1/-1;background:var(--paper-card);border:1px solid var(--rule);border-radius:16px;">
          Your cart is empty. <a href="mba-partner-courses-redesign.html" style="color:var(--primary);font-weight:700;">Browse courses</a> to add a program before checking out.
        </div>
      `;
        }

        function renderCheckout() {
            const cart = getCart();
            if (!cart.length) { renderEmpty(); return; }

            const totals = cartTotals(cart);
            const count = cart.reduce((s, i) => s + (i.qty || 1), 0);

            const itemsHtml = cart.map(i => `
        <div class="summary-item">
          <span>${i.name} <span class="qty">×${i.qty || 1}</span></span>
          <span class="price mono">${fmtINR(i.price * (i.qty || 1))}</span>
        </div>
      `).join('');

            document.getElementById('checkoutLayout').innerHTML = `
        <div class="pay-card">
          <div class="pay-tabs">
            <button type="button" class="pay-tab active" data-method="card" onclick="selectTab('card')">Card</button>
            <button type="button" class="pay-tab" data-method="upi" onclick="selectTab('upi')">UPI</button>
            <button type="button" class="pay-tab" data-method="netbanking" onclick="selectTab('netbanking')">Net Banking</button>
          </div>

          <div class="field-group">
            <label for="fullName">Full Name</label>
            <input id="fullName" type="text" placeholder="John Doe" autocomplete="name">
            <div class="err" id="nameErr"></div>
          </div>
          <div class="field-group">
            <label for="email">Email Address</label>
            <input id="email" type="email" placeholder="john@example.com" autocomplete="email">
            <div class="err" id="emailErr"></div>
          </div>
          <div class="field-group">
            <label for="phone">Phone Number</label>
            <input id="phone" type="tel" placeholder="+91 98765 43210" autocomplete="tel">
            <div class="err" id="phoneErr"></div>
          </div>

          <div class="pay-method-panel active" data-method="card">
            <div class="pay-note">
              💡 Card details are entered securely inside the Razorpay window that opens after you click <strong>Complete Payment</strong> — this page never sees or stores your card number.
            </div>
          </div>
          <div class="pay-method-panel" data-method="upi">
            <div class="upi-box">
              <svg width="48" height="48" viewBox="0 0 48 48" fill="none">
                <rect x="6" y="6" width="14" height="14" stroke="#6B7280" stroke-width="2" fill="none"/>
                <rect x="28" y="6" width="14" height="14" stroke="#6B7280" stroke-width="2" fill="none"/>
                <rect x="6" y="28" width="14" height="14" stroke="#6B7280" stroke-width="2" fill="none"/>
                <rect x="30" y="30" width="4" height="4" fill="#6B7280"/>
                <rect x="38" y="30" width="4" height="4" fill="#6B7280"/>
                <rect x="30" y="38" width="4" height="4" fill="#6B7280"/>
                <rect x="38" y="38" width="4" height="4" fill="#6B7280"/>
              </svg>
              <p>A UPI QR code and app list (Google Pay, PhonePe, Paytm…) will appear automatically inside the Razorpay window — generated for this exact order amount.</p>
            </div>
          </div>
          <div class="pay-method-panel" data-method="netbanking">
            <div class="netbanking-box">
              <svg width="48" height="48" viewBox="0 0 48 48" fill="none">
                <path d="M24 4 6 14v4h36v-4L24 4Z" stroke="#6B7280" stroke-width="2" fill="none"/>
                <path d="M10 18v18M18 18v18M30 18v18M38 18v18" stroke="#6B7280" stroke-width="2"/>
                <path d="M6 40h36" stroke="#6B7280" stroke-width="2"/>
              </svg>
              <p>You'll choose your bank from a full list inside the Razorpay window and log in there to complete payment.</p>
            </div>
          </div>

          <button type="button" class="btn btn-primary" id="payBtn" onclick="startPayment()">💳 Complete Payment</button>

          <div class="trust-row">
            <span class="item">🔒 256-bit SSL Encrypted</span>
            <span class="item">✅ PCI Compliant (via Razorpay)</span>
          </div>
        </div>

        <div class="summary-card">
          <h2>Order Summary</h2>
          <div class="summary-items">${itemsHtml}</div>
          <div class="summary-divider"></div>
          <div class="summary-row">
            <span>Subtotal (${count} ${count === 1 ? 'item' : 'items'})</span>
            <span class="val mono">${fmtINR(totals.originalSubtotal)}</span>
          </div>
          ${totals.savings > 0 ? `
          <div class="summary-row savings">
            <span>Discount</span>
            <span class="val mono">− ${fmtINR(totals.savings)}</span>
          </div>` : ''}
          <div class="summary-divider"></div>
          <div class="summary-total">
            <span class="label">Total</span>
            <span class="val">${fmtINR(totals.subtotal)}</span>
          </div>
        </div>
      `;
        }

        renderCheckout();
    </script>
</body>

</html>

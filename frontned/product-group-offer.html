<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Group Enrollment — MBA Partner</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400..900;1,9..144,400..900&family=Inter:wght@400;500;600;700;800&family=IBM+Plex+Mono:wght@500;600&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --ink: #0F1419;
            --ink-soft: #1a202c;
            --paper: #F8F6F3;
            --paper-card: #FFFFFF;
            --primary: #6366F1;
            --primary-dark: #4F46E5;
            --primary-light: #818CF8;
            --accent: #EC4899;
            --success: #10B981;
            --danger: #EF4444;
            --surface: #F3F4F6;
            --rule: #E5E7EB;
            --ink-faint: #6B7280;
            --radius: 12px;
        }

        * {
            box-sizing: border-box
        }

        html {
            scroll-behavior: smooth
        }

        body {
            margin: 0;
            background: var(--paper);
            color: var(--ink);
            font-family: 'Inter', system-ui, sans-serif;
            -webkit-font-smoothing: antialiased
        }

        h1,
        h2,
        h3 {
            font-family: 'Fraunces', serif;
            margin: 0;
            letter-spacing: -0.01em
        }

        .mono {
            font-family: 'IBM Plex Mono', monospace
        }

        a {
            color: inherit;
            text-decoration: none
        }

        .wrap {
            max-width: 1180px;
            margin: 0 auto;
            padding: 0 24px
        }

        :focus-visible {
            outline: 2px solid var(--primary);
            outline-offset: 3px
        }

        /* BREADCRUMB */
        .breadcrumb {
            padding: 16px 0;
            font-size: 13.5px;
            color: var(--ink-faint)
        }

        .breadcrumb a:hover {
            color: var(--primary)
        }

        .breadcrumb span.sep {
            margin: 0 8px;
            color: #C7CCD4
        }

        .breadcrumb span.current {
            color: var(--ink);
            font-weight: 600
        }

        /* HEAD */
        .page-head {
            padding: 8px 0 22px
        }

        .group-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            font-family: 'IBM Plex Mono', monospace;
            font-size: 11.5px;
            font-weight: 700;
            letter-spacing: .06em;
            text-transform: uppercase;
            padding: 5px 12px;
            border-radius: 999px;
            margin-bottom: 12px;
        }

        .group-badge.size-2 {
            background: rgba(16, 185, 129, .12);
            color: #0E9F6E
        }

        .group-badge.size-3 {
            background: rgba(236, 72, 153, .12);
            color: var(--accent)
        }

        .page-head h1 {
            font-size: clamp(26px, 3vw, 34px);
            font-weight: 700
        }

        .page-head p {
            margin-top: 8px;
            color: var(--ink-faint);
            font-size: 14.5px;
            max-width: 560px
        }

        .discount-pill {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            font-weight: 700;
            font-size: 13px;
            padding: 6px 14px;
            border-radius: 999px;
            margin-top: 14px;
            color: #fff;
        }

        .discount-pill.size-2 {
            background: var(--success)
        }

        .discount-pill.size-3 {
            background: var(--accent)
        }

        /* LAYOUT */
        .enroll-layout {
            display: flex;
            flex-direction: column;
            gap: 28px;
            padding-bottom: 60px
        }

        /* MEMBER CARDS */
        .members {
            display: flex;
            flex-direction: row;
            flex-wrap: wrap;
            gap: 16px;
            align-items: stretch
        }

        .member-card {
            background: var(--paper-card);
            border: 1px solid var(--rule);
            border-radius: 14px;
            padding: 22px;
            position: relative;
            transition: border-color .25s;
            flex: 1 1 300px;
            min-width: 280px
        }

        .member-card:focus-within,
        .member-card.has-error {
            border-color: var(--primary)
        }

        .member-head {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 16px
        }

        .member-head h3 {
            font-size: 15.5px;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 10px
        }

        .member-num {
            width: 24px;
            height: 24px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--primary) 0%, var(--accent) 100%);
            color: #fff;
            font-family: 'IBM Plex Mono', monospace;
            font-size: 12px;
            font-weight: 700;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0
        }

        .member-remove {
            font-size: 12px;
            font-weight: 600;
            color: var(--danger);
            background: none;
            border: none;
            cursor: pointer;
            padding: 0;
        }

        .member-remove:hover {
            opacity: .7
        }

        .field-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-bottom: 12px
        }

        @media (max-width: 520px) {
            .field-row {
                grid-template-columns: 1fr
            }
        }

        label.field-label {
            display: block;
            font-size: 12px;
            font-weight: 600;
            color: var(--ink-faint);
            margin-bottom: 5px;
            text-transform: uppercase;
            letter-spacing: .03em
        }

        .field-row input,
        .full-field input {
            width: 100%;
            border: 1.5px solid var(--rule);
            border-radius: 8px;
            padding: 10px 12px;
            font-size: 13.5px;
            font-family: 'Inter', system-ui, sans-serif;
            background: var(--surface);
            color: var(--ink)
        }

        .field-row input:focus-visible,
        .full-field input:focus-visible {
            outline: 2px solid var(--primary);
            outline-offset: 1px
        }

        .full-field {
            margin-bottom: 12px
        }

        .course-select-label {
            margin-bottom: 6px
        }

        .course-grid {
            display: flex;
            flex-direction: column;
            gap: 8px
        }

        .course-opt {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 10px;
            border: 1.5px solid var(--rule);
            border-radius: 9px;
            padding: 9px 12px;
            cursor: pointer;
            transition: all .2s;
            font-size: 13px
        }

        .course-opt:hover {
            border-color: var(--primary)
        }

        .course-opt.checked {
            border-color: var(--primary);
            background: rgba(99, 102, 241, .05)
        }

        .course-opt input {
            margin: 0
        }

        .course-opt .c-name {
            flex: 1;
            font-weight: 600
        }

        .course-opt .c-price {
            font-family: 'IBM Plex Mono', monospace;
            font-weight: 700;
            color: var(--primary-dark);
            font-size: 12.5px
        }

        .add-member-btn {
            border: 1.5px dashed var(--rule);
            background: var(--paper-card);
            color: var(--primary);
            font-weight: 700;
            font-size: 13.5px;
            border-radius: 12px;
            padding: 14px;
            cursor: pointer;
            transition: all .2s;
            flex: 1 1 220px;
            min-width: 220px
        }

        .add-member-btn:hover {
            border-color: var(--primary);
            background: rgba(99, 102, 241, .04)
        }

        /* SUMMARY — full width, horizontal layout below members */
        .summary-card {
            background: var(--paper-card);
            border: 1px solid var(--rule);
            border-radius: 16px;
            padding: 24px;
            width: 100%
        }

        .summary-card h2 {
            font-size: 18px;
            font-weight: 700;
            margin-bottom: 18px
        }

        .summary-flex {
            display: flex;
            flex-direction: row;
            flex-wrap: wrap;
            align-items: center;
            gap: 24px;
            justify-content: space-between
        }

        .summary-mini-list {
            display: flex;
            flex-direction: row;
            flex-wrap: wrap;
            gap: 8px;
            flex: 1 1 280px
        }

        .summary-mini-row {
            display: flex;
            gap: 6px;
            align-items: center;
            font-size: 12.5px;
            color: var(--ink-soft);
            border: 1px solid var(--rule);
            border-radius: 999px;
            padding: 6px 12px;
            white-space: nowrap
        }

        .summary-mini-row .nm {
            color: var(--ink-faint)
        }

        .summary-totals-row {
            display: flex;
            flex-direction: row;
            flex-wrap: wrap;
            align-items: center;
            gap: 22px
        }

        .summary-row {
            display: flex;
            flex-direction: column;
            gap: 2px;
            font-size: 12.5px;
            color: var(--ink-faint)
        }

        .summary-row .val {
            font-family: 'IBM Plex Mono', monospace;
            font-weight: 700;
            font-size: 15px;
            color: var(--ink)
        }

        .summary-row.savings .val {
            color: var(--success)
        }

        .summary-divider {
            border-top: 1px dashed var(--rule);
            margin: 10px 0
        }

        .summary-total {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            padding: 6px 0 4px
        }

        .summary-total .label {
            font-size: 15.5px;
            font-weight: 700
        }

        .summary-total .val {
            font-family: 'IBM Plex Mono', monospace;
            font-weight: 700;
            font-size: 24px;
            color: var(--ink)
        }

        .btn {
            padding: 14px 24px;
            border-radius: 10px;
            font-weight: 700;
            font-size: 14.5px;
            transition: all .3s;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            cursor: pointer;
            border: none;
            width: 100%;
            font-family: 'Inter', system-ui, sans-serif;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--primary) 0%, var(--accent) 100%);
            color: #fff;
            box-shadow: 0 4px 12px rgba(99, 102, 241, .3)
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 16px rgba(99, 102, 241, .4)
        }

        .btn-primary:disabled {
            opacity: .5;
            cursor: not-allowed;
            transform: none;
            box-shadow: none
        }

        .form-msg {
            font-size: 12.5px;
            color: var(--danger);
            margin-top: 10px;
            min-height: 16px
        }

        .summary-bottom-row {
            display: flex;
            flex-direction: row;
            flex-wrap: wrap;
            align-items: center;
            justify-content: space-between;
            gap: 18px;
            margin-top: 18px;
            padding-top: 18px;
            border-top: 1px dashed var(--rule)
        }

        .summary-bottom-row .btn {
            width: auto;
            flex: 0 0 auto
        }

        .trust-row {
            display: flex;
            flex-direction: row;
            flex-wrap: wrap;
            gap: 14px;
            font-size: 12px;
            color: var(--ink-faint)
        }

        .trust-row .item {
            display: flex;
            align-items: center;
            gap: 6px
        }

        /* CONFIRMATION */
        .confirm-card {
            background: var(--paper-card);
            border: 1px solid var(--rule);
            border-radius: 16px;
            padding: 48px 32px;
            text-align: center;
            grid-column: 1/-1
        }

        .confirm-icon {
            width: 60px;
            height: 60px;
            margin: 0 auto 18px;
            border-radius: 50%;
            background: rgba(16, 185, 129, .12);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 26px
        }

        .confirm-card h2 {
            font-size: 22px;
            font-weight: 700
        }

        .confirm-card p {
            margin: 10px auto 0;
            color: var(--ink-faint);
            font-size: 14px;
            max-width: 480px
        }

        .confirm-order {
            margin-top: 18px;
            font-family: 'IBM Plex Mono', monospace;
            font-size: 13px;
            color: var(--ink-faint)
        }

        .confirm-buttons {
            display: flex;
            gap: 12px;
            justify-content: center;
            margin-top: 26px;
            flex-wrap: wrap
        }

        .confirm-buttons a {
            padding: 12px 22px;
            border-radius: 999px;
            font-weight: 700;
            font-size: 13.5px;
            transition: all .3s
        }

        .confirm-buttons a.primary {
            background: linear-gradient(135deg, var(--primary) 0%, var(--accent) 100%);
            color: #fff;
            box-shadow: 0 4px 12px rgba(99, 102, 241, .3)
        }

        .confirm-buttons a.primary:hover {
            transform: translateY(-2px)
        }

        .confirm-buttons a.secondary {
            border: 1.4px solid var(--rule);
            color: var(--ink)
        }

        .confirm-buttons a.secondary:hover {
            border-color: var(--primary);
            color: var(--primary)
        }

        footer {
            background: linear-gradient(135deg, #0F1419 0%, #1a202c 100%);
            color: #fff;
            padding: 30px 0;
            margin-top: 20px;
            text-align: center;
            font-size: 12.5px;
            color: #8B92A0
        }
    </style>
</head>

<body>

    <div class="wrap">
        <div class="breadcrumb">
            <a href="index.html" id="breadcrumbHomeLink">Home</a><span class="sep">/</span><span class="current"
                id="breadcrumbLabel">Group Enrollment</span>
        </div>
    </div>

    <section class="page-head">
        <div class="wrap">
            <span class="group-badge" id="groupBadge">GROUP OF 2</span>
            <h1 id="pageTitle">Enroll with a friend</h1>
            <p id="pageSub">Fill in each member's details and pick their course. The 20% discount is applied
                automatically to your combined total.</p>
            <div class="discount-pill" id="discountPill">20% off combined total</div>
        </div>
    </section>

    <section>
        <div class="wrap">
            <div class="enroll-layout" id="enrollLayout"></div>
        </div>
    </section>

    <footer>
        <div class="wrap">MBA Partner — Initiative by Alumni of Old IIM</div>
    </footer>

    <script src="cart.js"></script>
    <script>
        // ---------- Course catalogue (kept in sync with cart-page.html) ----------
        const COURSE_CATALOGUE = [
            { id: 'Placements Bootcamp + Case Comp + 1 Live Project', name: 'Placements Bootcamp + Case Comp + 1 Live Project', price: 13999 },
            { id: 'All-in-One Combo', name: 'All-in-One Combo', price: 14999 },
            { id: 'Any 1 Domain', name: 'Any 1 Domain', price: 4999 },
            { id: 'Any 2 Domains', name: 'Any 2 Domains', price: 8499 },
            { id: 'Bootcamp + Case Comp', name: 'Bootcamp + Case Comp', price: 10499 },
            { id: 'Bootcamp + Live Project', name: 'Bootcamp + Live Project', price: 10999 },
            { id: 'Case Comp + Live Project', name: 'Case Comp + Live Project', price: 9999 },
            { id: 'Case Competition', name: 'Case Competition', price: 6499 },
            { id: 'Placements Bootcamp + Case Comp', name: 'Placements Bootcamp + Case Comp', price: 10499 },
            { id: 'Power BI Certificate', name: 'Power BI Certificate', price: 2999 },
        ];

        function fmtINR(n) { return '₹' + Math.round(n).toLocaleString('en-IN'); }

        // ---------- Detect MBA vs CAT/OMET context ----------
        // Same heuristic as cart-page.html: look at items already in the MBACart
        // localStorage cart. Fallback to the referring page's filename if cart is empty.
        function isCatItem(item) {
            const name = ((item.id || '') + ' ' + (item.name || '')).toLowerCase();
            return (
                name.includes('cat') || name.includes('omet') || name.includes('gd-pi') ||
                name.includes('gdpi') || name.includes('gd pi') || name.includes('full-length mock') ||
                name.includes('full length mock') || name.includes('sectional test') ||
                name.includes('mock series') || name.includes('1-on-1 mentor') ||
                name.includes('1on1 mentor') || name.includes('cohort mentor') || name.includes('wat')
            );
        }

        function detectContext() {
            try {
                const raw = localStorage.getItem('mbaPartnerCart');
                const cart = raw ? JSON.parse(raw) : [];
                if (cart.length) {
                    const hasCat = cart.some(isCatItem);
                    const hasMba = cart.some(item => !isCatItem(item));
                    if (hasCat && !hasMba) return 'cat';
                    if (hasMba) return 'mba';
                }
            } catch (e) { /* ignore parse errors, fall through */ }

            // Fallback: infer from referrer page filename
            const ref = (document.referrer || '').toLowerCase();
            if (ref.includes('cat-omet')) return 'cat';
            return 'mba';
        }

        const CONTEXT = detectContext();
        const HOME_URL = CONTEXT === 'cat' ? 'mba-partner-cat-omet-home.html' : 'index.html';

        // ---------- Determine group type ----------
        // Accepts ?size=2/3, ?size=3+, ?group=2/3, ?tier=2/3, or values like 'three'/'group3'.
        // Priority: URL param (always wins) → sessionStorage fallback → default 2.
        function parseGroupSize() {
            const params = new URLSearchParams(window.location.search);
            const raw = (params.get('size') || params.get('group') || params.get('tier') || params.get('type') || '').toLowerCase().trim();
            if (raw) {
                if (raw.includes('3') || raw.includes('three')) return '3';
                if (raw.includes('2') || raw.includes('two')) return '2';
            }
            const stored = sessionStorage.getItem('mbaGroupSize');
            if (stored === '2' || stored === '3') return stored;
            return '2';
        }

        const sizeParam = parseGroupSize();
        sessionStorage.setItem('mbaGroupSize', sizeParam);
        const isGroup3 = sizeParam === '3';
        const MIN_MEMBERS = isGroup3 ? 3 : 2;
        const DISCOUNT_RATE = isGroup3 ? 0.30 : 0.20;
        const MAX_MEMBERS = isGroup3 ? 10 : 2; // group of 2 is fixed; group 3+ can grow

        let memberCount = MIN_MEMBERS;
        let nextId = 0;
        let members = []; // {uid, name, email, phone, courseId}

        function initMembers() {
            members = [];
            for (let i = 0; i < MIN_MEMBERS; i++) {
                members.push({ uid: nextId++, name: '', email: '', phone: '', courseId: '' });
            }
        }

        function setupPageChrome() {
            const homeLink = document.getElementById('breadcrumbHomeLink');
            if (homeLink) homeLink.href = HOME_URL;

            const badge = document.getElementById('groupBadge');
            const title = document.getElementById('pageTitle');
            const sub = document.getElementById('pageSub');
            const pill = document.getElementById('discountPill');
            const breadcrumb = document.getElementById('breadcrumbLabel');

            if (isGroup3) {
                badge.textContent = 'GROUP OF 3+';
                badge.className = 'group-badge size-3';
                title.textContent = 'Bring your whole squad';
                sub.textContent = "Fill in each member's details and pick their course. The 30% discount is applied automatically to your combined total — add more members if your group is bigger than 3.";
                pill.textContent = '30% off combined total';
                pill.className = 'discount-pill size-3';
                breadcrumb.textContent = 'Group of 3+ Enrollment';
            } else {
                badge.textContent = 'GROUP OF 2';
                badge.className = 'group-badge size-2';
                title.textContent = 'Enroll with a friend';
                sub.textContent = "Fill in each member's details and pick their course. The 20% discount is applied automatically to your combined total.";
                pill.textContent = '20% off combined total';
                pill.className = 'discount-pill size-2';
                breadcrumb.textContent = 'Group of 2 Enrollment';
            }
        }

        function courseOptionsHtml(member) {
            return COURSE_CATALOGUE.map(c => {
                const checked = member.courseId === c.id ? 'checked' : '';
                const cls = member.courseId === c.id ? 'course-opt checked' : 'course-opt';
                return `
          <label class="${cls}">
            <input type="radio" name="course-${member.uid}" value="${c.id}" ${checked}
              onchange="setMemberCourse(${member.uid}, '${c.id}')" />
            <span class="c-name">${c.name}</span>
            <span class="c-price mono">${fmtINR(c.price)}</span>
          </label>`;
            }).join('');
        }

        function memberCardHtml(member, index) {
            const canRemove = isGroup3 && members.length > MIN_MEMBERS;
            return `
        <div class="member-card" id="member-${member.uid}">
          <div class="member-head">
            <h3><span class="member-num">${index + 1}</span> Member ${index + 1}</h3>
            ${canRemove ? `<button type="button" class="member-remove" onclick="removeMember(${member.uid})">Remove</button>` : ''}
          </div>
          <div class="field-row">
            <div>
              <label class="field-label">Full name</label>
              <input type="text" id="name-${member.uid}" name="name-${member.uid}" autocomplete="off"
                value="${member.name}" placeholder="e.g. Riya Sharma"
                oninput="updateMember(${member.uid}, 'name', this.value)" />
            </div>
            <div>
              <label class="field-label">Phone number</label>
              <input type="tel" id="phone-${member.uid}" name="phone-${member.uid}" autocomplete="off"
                value="${member.phone}" placeholder="+91 9XXXXXXXXX"
                oninput="updateMember(${member.uid}, 'phone', this.value)" />
            </div>
          </div>
          <div class="full-field">
            <label class="field-label">Email</label>
            <input type="email" id="email-${member.uid}" name="email-${member.uid}" autocomplete="off"
              value="${member.email}" placeholder="name@email.com"
              oninput="updateMember(${member.uid}, 'email', this.value)" />
          </div>
          <div>
            <label class="field-label course-select-label">Select course for this member</label>
            <div class="course-grid">${courseOptionsHtml(member)}</div>
          </div>
        </div>`;
        }

        function updateMember(uid, field, value) {
            const m = members.find(x => x.uid === uid);
            if (m) m[field] = value;
            renderSummary();
        }

        function setMemberCourse(uid, courseId) {
            const m = members.find(x => x.uid === uid);
            if (m) m.courseId = courseId;
            render(); // re-render so highlighted state updates
        }

        function addMember() {
            if (members.length >= MAX_MEMBERS) return;
            members.push({ uid: nextId++, name: '', email: '', phone: '', courseId: '' });
            render();
        }

        function removeMember(uid) {
            if (members.length <= MIN_MEMBERS) return;
            members = members.filter(x => x.uid !== uid);
            render();
        }

        function calcTotals() {
            const original = members.reduce((sum, m) => {
                const c = COURSE_CATALOGUE.find(c => c.id === m.courseId);
                return sum + (c ? c.price : 0);
            }, 0);
            const discount = original * DISCOUNT_RATE;
            const final = original - discount;
            return { original, discount, final };
        }

        function renderSummary() {
            const t = calcTotals();
            const totals = document.getElementById('summaryTotals');
            if (!totals) return;
            const miniRows = members.map((m, i) => {
                const c = COURSE_CATALOGUE.find(c => c.id === m.courseId);
                const label = m.name.trim() || `Member ${i + 1}`;
                const price = c ? fmtINR(c.price) : '—';
                return `<div class="summary-mini-row"><span class="nm">${label}</span><span class="mono">${price}</span></div>`;
            }).join('');

            totals.innerHTML = `
        <div class="summary-flex">
          <div class="summary-mini-list">${miniRows}</div>
          <div class="summary-totals-row">
            <div class="summary-row">
              <span>Combined subtotal</span>
              <span class="val mono">${fmtINR(t.original)}</span>
            </div>
            <div class="summary-row savings">
              <span>Group discount (${Math.round(DISCOUNT_RATE * 100)}%)</span>
              <span class="val mono">− ${fmtINR(t.discount)}</span>
            </div>
            <div class="summary-total">
              <span class="label">Total</span>
              <span class="val">${fmtINR(t.final)}</span>
            </div>
          </div>
        </div>
      `;

            const btn = document.getElementById('submitBtn');
            const allFilled = members.every(m => m.name.trim() && m.email.trim() && m.phone.trim() && m.courseId);
            btn.disabled = !allFilled;
        }

        function buildWhatsAppMessage() {
            const t = calcTotals();
            const lines = [`*Group Enrollment Request — ${isGroup3 ? 'Group of 3+' : 'Group of 2'}*`, ''];
            members.forEach((m, i) => {
                const c = COURSE_CATALOGUE.find(c => c.id === m.courseId);
                lines.push(`${i + 1}. ${m.name} | ${m.phone} | ${m.email} | ${c ? c.name : '—'} (${c ? fmtINR(c.price) : ''})`);
            });
            lines.push('', `Combined subtotal: ${fmtINR(t.original)}`, `Discount (${Math.round(DISCOUNT_RATE * 100)}%): -${fmtINR(t.discount)}`, `Total payable: ${fmtINR(t.final)}`);
            return lines.join('\n');
        }

        function submitGroup() {
            const allFilled = members.every(m => m.name.trim() && m.email.trim() && m.phone.trim() && m.courseId);
            const msg = document.getElementById('formMsg');
            if (!allFilled) {
                msg.textContent = 'Please fill in every member\'s details and course before continuing.';
                return;
            }
            msg.textContent = '';
            addGroupToCartAndRedirect();
        }

        // Pushes each member's course into the shared MBACart cart (same store cart-page.html
        // reads from), with the group discount baked into the price, then redirects to cart.html.
        function addGroupToCartAndRedirect() {
            if (!window.MBACart || typeof window.MBACart.getCart !== 'function') {
                console.error('cart.js not loaded — cannot add items to cart.');
                return;
            }

            const cart = window.MBACart.getCart();
            const discountLabel = `Group of ${isGroup3 ? '3+' : '2'} — ${Math.round(DISCOUNT_RATE * 100)}% off`;

            members.forEach(m => {
                const course = COURSE_CATALOGUE.find(c => c.id === m.courseId);
                if (!course) return;
                const discountedPrice = Math.round(course.price * (1 - DISCOUNT_RATE));
                cart.push({
                    id: `${course.id} (${m.name})`,
                    name: `${course.name} — ${m.name}`,
                    price: discountedPrice,
                    originalPrice: course.price,
                    qty: 1,
                    meta: discountLabel
                });
            });

            window.MBACart.setCart(cart);
            window.location.href = 'cart.html';
        }

        function showConfirmation() {
            const t = calcTotals();
            const orderId = 'GRP-' + Date.now().toString(36).toUpperCase();
            const layout = document.getElementById('enrollLayout');
            layout.innerHTML = `
        <div class="confirm-card">
          <div class="confirm-icon">✅</div>
          <h2>Group enrollment received</h2>
          <p>We've logged your ${members.length}-person group with a total of ${fmtINR(t.final)} after your ${Math.round(DISCOUNT_RATE * 100)}% discount. Our team will reach out on WhatsApp to confirm and collect payment for the whole group.</p>
          <div class="confirm-order">Reference: ${orderId}</div>
          <div class="confirm-buttons">
            <a class="primary" target="_blank" href="https://wa.me/?text=${encodeURIComponent(buildWhatsAppMessage() + '\n\nRef: ' + orderId)}">Send details on WhatsApp →</a>
            <a class="secondary" href="${HOME_URL}">Back to Home</a>
          </div>
        </div>
      `;
        }

        function render() {
            const layout = document.getElementById('enrollLayout');
            const membersHtml = members.map((m, i) => memberCardHtml(m, i)).join('');
            const addBtn = isGroup3 && members.length < MAX_MEMBERS
                ? `<button type="button" class="add-member-btn" onclick="addMember()">+ Add another member</button>`
                : '';

            layout.innerHTML = `
        <div class="members">
          ${membersHtml}
          ${addBtn}
        </div>
        <div class="summary-card">
          <h2>Group Order Summary</h2>
          <div id="summaryTotals"></div>
          <div class="summary-bottom-row">
            <button type="button" id="submitBtn" class="btn btn-primary" onclick="submitGroup()">Confirm Group Enrollment →</button>
            <div class="trust-row">
              <span class="item">✅ Mentored by MBA Partner Alumni</span>
              <span class="item">👥 Discount auto-applied at this step</span>
              <span class="item">🛒 Added straight to your cart</span>
            </div>
          </div>
          <div class="form-msg" id="formMsg"></div>
        </div>
      `;
            renderSummary();
        }

        setupPageChrome();
        initMembers();
        render();
    </script>
</body>

</html>
